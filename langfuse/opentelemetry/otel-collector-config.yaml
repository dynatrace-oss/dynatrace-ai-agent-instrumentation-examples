receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Tag all Langfuse spans before the main transform so the source is always set.
  attributes/tag_langfuse:
    include:
      match_type: regexp
      services: [".*"]
      attributes:
        - key: langfuse.observation.type
          value: ".*"
    actions:
      - key: ai.observability.source
        value: langfuse
        action: upsert

  transform/langfuse:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          # ── 1. OPERATION NAME ─────────────────────────────────────────────────
          # langfuse.observation.type: "generation" | "embedding" | "span" | "event"
          - set(attributes["gen_ai.operation.name"], "chat") where attributes["langfuse.observation.type"] == "generation"
          - set(attributes["gen_ai.operation.name"], "embeddings") where attributes["langfuse.observation.type"] == "embedding"
          - set(attributes["gen_ai.operation.name"], attributes["langfuse.observation.type"]) where attributes["langfuse.observation.type"] != nil and attributes["gen_ai.operation.name"] == nil

          # ── 2. REQUEST MODEL ──────────────────────────────────────────────────
          - set(attributes["gen_ai.request.model"], attributes["langfuse.observation.model.name"]) where attributes["langfuse.observation.model.name"] != nil

          # ── 3. PROVIDER INFERENCE ─────────────────────────────────────────────
          - set(attributes["gen_ai.provider.name"], "openai") where IsMatch(attributes["gen_ai.request.model"], "^(gpt-|o[1-9]|text-|davinci|babbage|curie|ada)") and attributes["gen_ai.provider.name"] == nil
          - set(attributes["gen_ai.provider.name"], "anthropic") where IsMatch(attributes["gen_ai.request.model"], "^claude-") and attributes["gen_ai.provider.name"] == nil
          - set(attributes["gen_ai.provider.name"], "google") where IsMatch(attributes["gen_ai.request.model"], "^(gemini-|palm)") and attributes["gen_ai.provider.name"] == nil
          - set(attributes["gen_ai.provider.name"], "meta") where IsMatch(attributes["gen_ai.request.model"], "(?i)llama") and attributes["gen_ai.provider.name"] == nil
          - set(attributes["gen_ai.provider.name"], "mistral") where IsMatch(attributes["gen_ai.request.model"], "^(mistral|mixtral)") and attributes["gen_ai.provider.name"] == nil
          - set(attributes["gen_ai.provider.name"], "cohere") where IsMatch(attributes["gen_ai.request.model"], "^(command|embed-|rerank)") and attributes["gen_ai.provider.name"] == nil

          # ── 4. RESPONSE MODEL (P1 — critical) ────────────────────────────────
          - set(attributes["gen_ai.response.model"], attributes["gen_ai.request.model"]) where attributes["langfuse.observation.type"] == "generation" and attributes["gen_ai.request.model"] != nil

          # ── 5. LLM REQUEST TYPE (P2) ──────────────────────────────────────────
          - set(attributes["llm.request.type"], "chat") where attributes["langfuse.observation.type"] == "generation"

          # ── 6. TOKEN USAGE ────────────────────────────────────────────────────
          # langfuse 4.x emits token counts as a JSON string in langfuse.observation.usage_details.
          # Key names vary by model: prompt_tokens/completion_tokens (gpt-4o-mini),
          # input/output_reasoning_tokens (gpt-5 reasoning models).
          # Fallback chain: error_mode:ignore causes Int(nil) to throw, skipping the
          # statement and leaving the attribute nil so the next fallback fires.
          - set(attributes["gen_ai.usage.input_tokens"], Int(ParseJSON(attributes["langfuse.observation.usage_details"])["prompt_tokens"])) where attributes["langfuse.observation.usage_details"] != nil
          - set(attributes["gen_ai.usage.input_tokens"], Int(ParseJSON(attributes["langfuse.observation.usage_details"])["input_tokens"])) where attributes["langfuse.observation.usage_details"] != nil and attributes["gen_ai.usage.input_tokens"] == nil
          - set(attributes["gen_ai.usage.input_tokens"], Int(ParseJSON(attributes["langfuse.observation.usage_details"])["input"])) where attributes["langfuse.observation.usage_details"] != nil and attributes["gen_ai.usage.input_tokens"] == nil
          - set(attributes["gen_ai.usage.output_tokens"], Int(ParseJSON(attributes["langfuse.observation.usage_details"])["completion_tokens"])) where attributes["langfuse.observation.usage_details"] != nil
          - set(attributes["gen_ai.usage.output_tokens"], Int(ParseJSON(attributes["langfuse.observation.usage_details"])["output_tokens"])) where attributes["langfuse.observation.usage_details"] != nil and attributes["gen_ai.usage.output_tokens"] == nil
          - set(attributes["gen_ai.usage.output_tokens"], Int(ParseJSON(attributes["langfuse.observation.usage_details"])["output_reasoning_tokens"])) where attributes["langfuse.observation.usage_details"] != nil and attributes["gen_ai.usage.output_tokens"] == nil

          # ── 7. INPUT MESSAGES (P3) ───────────────────────────────────────────
          - set(attributes["gen_ai.input.messages"], attributes["langfuse.observation.input"]) where attributes["langfuse.observation.type"] == "generation" and attributes["langfuse.observation.input"] != nil

          # ── 8. OUTPUT MESSAGES (P4) ─────────────────────────────────────────
          - set(attributes["gen_ai.output.messages"], attributes["langfuse.observation.output"]) where attributes["langfuse.observation.type"] == "generation" and attributes["langfuse.observation.output"] != nil

          # ── 9. CONVERSATION ID (P5) ─────────────────────────────────────────
          # Node/manual path: langfuse.session_id attribute on the span.
          - set(attributes["gen_ai.conversation.id"], attributes["langfuse.session_id"]) where attributes["langfuse.session_id"] != nil
          - set(attributes["gen_ai.conversation.id"], attributes["langfuse.sessionId"]) where attributes["langfuse.sessionId"] != nil and attributes["gen_ai.conversation.id"] == nil
          # Python SDK path: sets session.id using the standard OTel attribute name.
          - set(attributes["gen_ai.conversation.id"], attributes["session.id"]) where attributes["session.id"] != nil and attributes["gen_ai.conversation.id"] == nil

          # ── 10. SESSION & USER IDS ───────────────────────────────────────────
          - set(attributes["session.id"], attributes["langfuse.session_id"]) where attributes["langfuse.session_id"] != nil
          - set(attributes["session.id"], attributes["langfuse.sessionId"]) where attributes["langfuse.sessionId"] != nil and attributes["session.id"] == nil
          - delete_key(attributes, "langfuse.session_id") where attributes["langfuse.session_id"] != nil
          - delete_key(attributes, "langfuse.sessionId") where attributes["langfuse.sessionId"] != nil

          - set(attributes["user.id"], attributes["langfuse.user_id"]) where attributes["langfuse.user_id"] != nil
          - set(attributes["user.id"], attributes["langfuse.userId"]) where attributes["langfuse.userId"] != nil and attributes["user.id"] == nil
          - delete_key(attributes, "langfuse.user_id") where attributes["langfuse.user_id"] != nil
          - delete_key(attributes, "langfuse.userId") where attributes["langfuse.userId"] != nil

          # ── 11. TEMPERATURE ───────────────────────────────────────────────────
          # langfuse 4.x emits model parameters as a JSON string in langfuse.observation.model.parameters.
          - set(attributes["gen_ai.request.temperature"], Double(ParseJSON(attributes["langfuse.observation.model.parameters"])["temperature"])) where attributes["langfuse.observation.model.parameters"] != nil

          # ── 12. SPAN STATUS ───────────────────────────────────────────────────
          # The Langfuse Python SDK does not set OTel span status on success, leaving it UNSET.
          # Set OK for generation spans so the service health tile in Dynatrace reflects success.
          # ERROR level observations map to ERROR status.
          - set(status.code, STATUS_CODE_ERROR) where attributes["langfuse.observation.level"] == "ERROR" and status.code == STATUS_CODE_UNSET
          - set(status.code, STATUS_CODE_OK) where attributes["langfuse.observation.type"] == "generation" and status.code == STATUS_CODE_UNSET

          # ── 13. CLEANUP ───────────────────────────────────────────────────────
          # Remove the routing discriminator after transformation. OpenPipeline routes
          # on isNotNull(langfuse.observation.type), so deleting it here prevents
          # collector-transformed spans from being re-processed by OpenPipeline.
          - delete_key(attributes, "langfuse.observation.type")

exporters:
  debug:
    verbosity: detailed
  otlp_http/dynatrace:
    endpoint: ${env:DT_ENDPOINT}/api/v2/otlp
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/tag_langfuse, transform/langfuse]
      exporters: [debug, otlp_http/dynatrace]
