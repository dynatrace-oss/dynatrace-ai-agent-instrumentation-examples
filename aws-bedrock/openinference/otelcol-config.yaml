receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Normalize OpenInference attributes to the OTel gen_ai.* semantic conventions.
  # The built-in "openinference" source maps model, provider, token usage, tool,
  # agent and session attributes, and reconstructs the flattened
  # llm.input_messages.N.* / llm.output_messages.N.* into gen_ai.input.messages
  # and gen_ai.output.messages. remove_originals drops the raw llm.* attributes
  # so the exported spans carry only gen_ai.* fields.
  gen_ai_normalizer:
    sources:
      - name: openinference
        remove_originals: true

  # gen_ai_normalizer maps llm.model_name -> gen_ai.request.model but does not
  # emit gen_ai.response.model (OpenInference has no separate response-model
  # field). The Dynatrace AI Observability app requires gen_ai.response.model,
  # so mirror the request model when the response has not set one.
  transform/response_model:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["gen_ai.response.model"], attributes["gen_ai.request.model"]) where attributes["gen_ai.request.model"] != nil and attributes["gen_ai.response.model"] == nil

  # ── 11c. LLM GUARDRAIL PARAMETERS ──────────────────────────────────────────
  # Extracts AWS Bedrock Guardrails identifiers from the llm.invocation_parameters
  # JSON string emitted by OpenInference instrumentation.
  #
  # Scoped to OpenInference spans via:
  #   (IsMatch(instrumentation_scope.name, "openinference.*") or IsMatch(attributes["otel.scope.name"], "openinference.*"))
  transform/llm-invocation-params:
    error_mode: ignore
    trace_statements:
      - context: span
        statements:
          - set(attributes["temp.invocation_params"], ParseJSON(attributes["llm.invocation_parameters"])) where attributes["llm.invocation_parameters"] != nil and (IsMatch(instrumentation_scope.name, "openinference.*") or IsMatch(attributes["otel.scope.name"], "openinference.*"))
          - set(attributes["gen_ai.guardrail.id"], attributes["temp.invocation_params"]["guardrailIdentifier"]) where attributes["temp.invocation_params"]["guardrailIdentifier"] != nil
          - set(attributes["gen_ai.guardrail.version"], attributes["temp.invocation_params"]["guardrailVersion"]) where attributes["temp.invocation_params"]["guardrailVersion"] != nil
          - delete_key(attributes, "temp.invocation_params") where attributes["temp.invocation_params"] != nil

  batch:
    send_batch_size: 512
    timeout: 5s

exporters:
  otlp_http/dynatrace:
    endpoint: "${env:DT_ENDPOINT}/api/v2/otlp"
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [gen_ai_normalizer, transform/response_model, transform/llm-invocation-params, batch]
      exporters: [otlp_http/dynatrace]
    metrics:
      receivers: [otlp]
      exporters: [otlp_http/dynatrace]
    logs:
      receivers: [otlp]
      exporters: [otlp_http/dynatrace]
