name: Nightly E2E Tests

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC daily
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.22'
  UV_VERSION: '0.11.21'

jobs:
  oneagent:
    name: E2E / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aws-bedrock-oneagent
            app_dir: aws-bedrock/oneagent
            test_run: TestAWSBedrockOneAgent
          - name: aws-bedrock-openinference
            app_dir: aws-bedrock/openinference
            test_run: TestAWSBedrockOpenInference

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install "uv==$UV_VERSION"

      - name: Install Dynatrace OneAgent
        env:
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          DT_INSTALLER_TOKEN: ${{ secrets.DT_INSTALLER_TOKEN }}
        run: |
          set -euo pipefail
          case "${DT_ENDPOINT}" in
            https://*) ;;
            *) echo "Error: DT_ENDPOINT must start with https://"; exit 1 ;;
          esac
          INSTALLER_DIR=$(mktemp -d)
          trap 'rm -rf "$INSTALLER_DIR"' EXIT
          wget --timeout=60 -O "$INSTALLER_DIR/oneagent.sh" \
            "${DT_ENDPOINT}/api/v1/deployment/installer/agent/unix/default/latest?arch=x86" \
            --header "Authorization: Api-Token ${DT_INSTALLER_TOKEN}"
          sudo sh "$INSTALLER_DIR/oneagent.sh" --set-infra-only=false

      - name: Run e2e test
        working-directory: test/e2e
        env:
          TEST_RUN: ${{ matrix.test_run }}
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          DT_APPS_ENDPOINT: ${{ secrets.DT_APPS_ENDPOINT }}
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if ! [[ "$TEST_RUN" =~ ^[A-Za-z][A-Za-z0-9_]+$ ]]; then
            echo "Error: TEST_RUN contains invalid characters: $TEST_RUN"; exit 1
          fi
          go test ./... -run "$TEST_RUN" -v -timeout 20m

      - name: Uninstall OneAgent
        if: always()
        run: |
          if [ -f /opt/dynatrace/oneagent/agent/uninstall.sh ]; then
            sudo /opt/dynatrace/oneagent/agent/uninstall.sh
          fi

  opentelemetry:
    name: E2E / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: aws-bedrock-opentelemetry
            app_dir: aws-bedrock/opentelemetry
            test_run: TestAWSBedrockOpenTelemetry

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install "uv==$UV_VERSION"

      - name: Run e2e test
        working-directory: test/e2e
        env:
          TEST_RUN: ${{ matrix.test_run }}
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          DT_APPS_ENDPOINT: ${{ secrets.DT_APPS_ENDPOINT }}
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          MAX_RUNS: '1'
        run: |
          set -euo pipefail
          if ! [[ "$TEST_RUN" =~ ^[A-Za-z][A-Za-z0-9_]+$ ]]; then
            echo "Error: TEST_RUN contains invalid characters: $TEST_RUN"; exit 1
          fi
          go test ./... -run "$TEST_RUN" -v -timeout 20m
