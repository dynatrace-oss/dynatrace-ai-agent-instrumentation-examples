name: Nightly E2E Tests

on:
  schedule:
    - cron: "0 2 * * *" # 02:00 UTC daily
  workflow_dispatch:
    inputs:
      suite:
        description: 'Run only this suite by name (e.g. openai-oneagent, litellm-opentelemetry). Leave blank to run all.'
        required: false
        type: string
  pull_request:

permissions:
  contents: read

jobs:
  # Computes which matrix entries should run based on the trigger:
  #   schedule           → all entries
  #   workflow_dispatch  → selected suite only; all entries if no suite input given
  #   pull_request       → all entries (full validation on every PR)
  filter:
    runs-on: ubuntu-latest
    outputs:
      oneagent-matrix: ${{ steps.compute.outputs.oneagent-matrix }}
      otelcol-matrix: ${{ steps.compute.outputs.otelcol-matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute matrices
        id: compute
        env:
          EVENT: ${{ github.event_name }}
          SUITE_INPUT: ${{ inputs.suite }}
          BASE_REF: ${{ github.base_ref }}
        run: bash .github/scripts/compute-e2e-matrix.sh

  # Per-suite oneagent job for PR and workflow_dispatch triggers.
  # Each matrix entry runs on its own runner and installs/uninstalls OneAgent independently.
  # On schedule, use oneagent-nightly instead (installs OneAgent once across all suites).
  oneagent:
    name: E2E / ${{ matrix.name }}
    needs: filter
    if: (github.event_name == 'pull_request' || inputs.suite != '') && needs.filter.outputs.oneagent-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.filter.outputs.oneagent-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/e2e/go.mod
          cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install -r test/e2e/requirements-tools.txt

      - name: Cache Ollama model
        if: matrix.ollama_model != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ollama/models
          key: ollama-${{ matrix.ollama_model }}

      - name: Set up Ollama
        if: matrix.ollama_model != ''
        run: |
          set -euo pipefail
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          timeout 30 bash -c 'until curl -sf http://localhost:11434/api/tags > /dev/null; do sleep 1; done'
          ollama pull ${{ matrix.ollama_model }}

      - name: Resolve OneAgent installer version
        id: oneagent-version
        env:
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          DT_INSTALLER_TOKEN: ${{ secrets.DT_INSTALLER_TOKEN }}
        run: |
          set -euo pipefail
          case "${DT_ENDPOINT}" in
            https://*) ;;
            *) echo "Error: DT_ENDPOINT must start with https://"; exit 1 ;;
          esac
          VERSION=$(curl -sS --fail \
            --header "Authorization: Api-Token ${DT_INSTALLER_TOKEN}" \
            "${DT_ENDPOINT}/api/v1/deployment/installer/agent/unix/default/latest/metainfo?arch=x86" \
            | jq -r '.latestAgentVersion')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: could not resolve latest OneAgent version from metainfo endpoint"; exit 1
          fi
          echo "resolved OneAgent version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache OneAgent installer
        id: oneagent-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/oneagent/oneagent.sh
          key: oneagent-installer-${{ steps.oneagent-version.outputs.version }}-x86

      - name: Download Dynatrace OneAgent installer
        if: steps.oneagent-cache.outputs.cache-hit != 'true'
        env:
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          DT_INSTALLER_TOKEN: ${{ secrets.DT_INSTALLER_TOKEN }}
          VERSION: ${{ steps.oneagent-version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/oneagent
          wget --timeout=60 -O ~/.cache/oneagent/oneagent.sh \
            "${DT_ENDPOINT}/api/v1/deployment/installer/agent/unix/default/version/${VERSION}?arch=x86" \
            --header "Authorization: Api-Token ${DT_INSTALLER_TOKEN}"

      - name: Install Dynatrace OneAgent
        run: sudo sh ~/.cache/oneagent/oneagent.sh

      - name: Run e2e test
        working-directory: test/e2e
        env:
          TEST_RUN: ${{ matrix.test_run }}
          OTEL_SERVICE_NAME: ${{ matrix.otel_service_name }}
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          DT_APPS_ENDPOINT: ${{ secrets.DT_APPS_ENDPOINT }}
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          MODEL: ${{ matrix.ollama_model != '' && matrix.ollama_model || secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
        run: |
          set -euo pipefail
          if ! [[ "$TEST_RUN" =~ ^[A-Za-z][A-Za-z0-9_]+$ ]]; then
            echo "Error: TEST_RUN contains invalid characters: $TEST_RUN"; exit 1
          fi
          go test ./... -run "$TEST_RUN" -v -timeout 20m

      - name: Write job summary
        if: always()
        run: |
          for f in test/e2e/reports/*.md; do
            [ -f "$f" ] || continue
            echo "## $(basename "$f" .md)" >> "$GITHUB_STEP_SUMMARY"
            cat "$f" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: span-audit-reports-${{ matrix.name }}
          path: test/e2e/reports/
          retention-days: 30

      - name: Uninstall OneAgent
        if: always()
        run: |
          if [ -f /opt/dynatrace/oneagent/agent/uninstall.sh ]; then
            sudo /opt/dynatrace/oneagent/agent/uninstall.sh
          fi

  # Consolidated nightly OneAgent job.
  # Installs OneAgent once, runs all oneagent suites sequentially, then uninstalls.
  # Only runs on the nightly schedule — PR and dispatch use the per-suite oneagent job above.
  oneagent-nightly:
    name: E2E / oneagent (nightly consolidated)
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.suite == '')
    runs-on: ubuntu-latest
    env:
      DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
      DT_APPS_ENDPOINT: ${{ secrets.DT_APPS_ENDPOINT }}
      DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
      OPENAI_API_BASE: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
      OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
      AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Record job start time
        run: echo "NIGHTLY_START_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/e2e/go.mod
          cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install -r test/e2e/requirements-tools.txt

      - name: Cache Ollama model
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.ollama/models
          key: ollama-tinyllama

      - name: Set up Ollama
        run: |
          set -euo pipefail
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          timeout 30 bash -c 'until curl -sf http://localhost:11434/api/tags > /dev/null; do sleep 1; done'
          ollama pull tinyllama

      - name: Resolve OneAgent installer version
        id: oneagent-version
        env:
          DT_INSTALLER_TOKEN: ${{ secrets.DT_INSTALLER_TOKEN }}
        run: |
          set -euo pipefail
          case "${DT_ENDPOINT}" in
            https://*) ;;
            *) echo "Error: DT_ENDPOINT must start with https://"; exit 1 ;;
          esac
          VERSION=$(curl -sS --fail \
            --header "Authorization: Api-Token ${DT_INSTALLER_TOKEN}" \
            "${DT_ENDPOINT}/api/v1/deployment/installer/agent/unix/default/latest/metainfo?arch=x86" \
            | jq -r '.latestAgentVersion')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: could not resolve latest OneAgent version from metainfo endpoint"; exit 1
          fi
          echo "resolved OneAgent version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache OneAgent installer
        id: oneagent-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/oneagent/oneagent.sh
          key: oneagent-installer-${{ steps.oneagent-version.outputs.version }}-x86

      - name: Download Dynatrace OneAgent installer
        if: steps.oneagent-cache.outputs.cache-hit != 'true'
        env:
          DT_INSTALLER_TOKEN: ${{ secrets.DT_INSTALLER_TOKEN }}
          VERSION: ${{ steps.oneagent-version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/oneagent
          wget --timeout=60 -O ~/.cache/oneagent/oneagent.sh \
            "${DT_ENDPOINT}/api/v1/deployment/installer/agent/unix/default/version/${VERSION}?arch=x86" \
            --header "Authorization: Api-Token ${DT_INSTALLER_TOKEN}"

      - name: Install Dynatrace OneAgent
        run: sudo sh ~/.cache/oneagent/oneagent.sh

      - name: Run aws-strands-oneagent
        working-directory: test/e2e
        env:
          TEST_RUN: TestAWSStrandsOneAgent
          OTEL_SERVICE_NAME: aws-strands/oneagent
        run: go test ./... -run "$TEST_RUN" -v -timeout 20m

      - name: Run aws-bedrock-oneagent
        if: always()
        working-directory: test/e2e
        env:
          TEST_RUN: TestAWSBedrockOneAgent
          OTEL_SERVICE_NAME: aws-bedrock/oneagent
          MODEL: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: go test ./... -run "$TEST_RUN" -v -timeout 20m

      - name: Run anthropic-oneagent
        if: always()
        working-directory: test/e2e
        env:
          TEST_RUN: TestAnthropicOneAgent
          OTEL_SERVICE_NAME: anthropic/oneagent
          MODEL: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: go test ./... -run "$TEST_RUN" -v -timeout 20m

      - name: Run openai-oneagent
        if: always()
        working-directory: test/e2e
        env:
          TEST_RUN: TestOpenAIOneAgent
          OTEL_SERVICE_NAME: openai/oneagent
          MODEL: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: go test ./... -run "$TEST_RUN" -v -timeout 20m

      - name: Run ollama-oneagent
        if: always()
        working-directory: test/e2e
        env:
          TEST_RUN: TestOllamaOneAgent
          OTEL_SERVICE_NAME: ollama/oneagent
          MODEL: tinyllama
        run: go test ./... -run "$TEST_RUN" -v -timeout 20m

      # MOCKED: no real GROQ_API_KEY yet — an in-process httptest stub intercepts
      # Groq SDK calls. OneAgent instruments at the SDK level so spans carry
      # real Groq attributes. Replace MODEL with GROQ_API_KEY when available.
      - name: Run groq-oneagent
        if: always()
        working-directory: test/e2e
        env:
          TEST_RUN: TestGroqOneAgent
          OTEL_SERVICE_NAME: groq/oneagent
          MODEL: tinyllama
        run: go test ./... -run "$TEST_RUN" -v -timeout 20m

      # MOCKED: no real COHERE_API_KEY yet — an in-process httptest stub intercepts
      # Cohere SDK calls via CO_API_URL. OneAgent instruments at the SDK level so spans
      # carry real Cohere attributes. Replace with COHERE_API_KEY when available.
      - name: Run cohere-oneagent
        if: always()
        working-directory: test/e2e
        env:
          TEST_RUN: TestCohereOneAgent
          OTEL_SERVICE_NAME: cohere/oneagent
          MODEL: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: go test ./... -run "$TEST_RUN" -v -timeout 20m

      # Uses real Azure OpenAI credentials via AzureOpenAIGenerator in Haystack.
      # Haystack disables its own tracing; OneAgent instruments the underlying openai SDK.
      # gen_ai.system value (expected: az.ai.openai) to be confirmed via ICP-6026.
      - name: Run haystack-oneagent
        if: always()
        working-directory: test/e2e
        env:
          TEST_RUN: TestHaystackOneAgent
          OTEL_SERVICE_NAME: haystack/oneagent
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
        run: go test ./... -run "$TEST_RUN" -v -timeout 20m

      # Runs after all per-service steps to detect entity merging: if OneAgent
      # assigned spans from multiple service.name values to the same SERVICE entity
      # (AI-167), this step fails and logs the offending entity IDs.
      - name: Assert entity isolation
        if: always()
        working-directory: test/e2e
        env:
          NIGHTLY_START_TIME: ${{ env.NIGHTLY_START_TIME }}
        run: go test ./... -run "TestOneAgentEntityIsolation" -v -timeout 15m

      - name: Write job summary
        if: always()
        run: |
          for f in test/e2e/reports/*.md; do
            [ -f "$f" ] || continue
            echo "## $(basename "$f" .md)" >> "$GITHUB_STEP_SUMMARY"
            cat "$f" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: span-audit-reports-oneagent-nightly
          path: test/e2e/reports/
          retention-days: 30

      - name: Uninstall OneAgent
        if: always()
        run: |
          if [ -f /opt/dynatrace/oneagent/agent/uninstall.sh ]; then
            sudo /opt/dynatrace/oneagent/agent/uninstall.sh
          fi

      # TEMP: force job failure to test notify logic — remove before merging
      - name: Force failure for notify test
        if: always()
        run: exit 1

  otelcol:
    name: E2E / ${{ matrix.name }}
    needs: filter
    if: needs.filter.outputs.otelcol-matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.filter.outputs.otelcol-matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: test/e2e/go.mod
          cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install -r test/e2e/requirements-tools.txt

      - name: Set up Node.js
        if: ${{ matrix.needs_node || matrix.node_version != '' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node_version || '22' }}

      - name: Set up Google credentials
        if: matrix.needs_google
        run: echo "GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}" >> $GITHUB_ENV

      - name: Run e2e test
        working-directory: test/e2e
        env:
          TEST_RUN: ${{ matrix.test_run }}
          OTEL_SERVICE_NAME: ${{ matrix.otel_service_name }}
          DT_ENDPOINT: ${{ secrets.DT_ENDPOINT }}
          OTEL_ENDPOINT: ${{ secrets.DT_ENDPOINT }}/api/v2/otlp
          DT_APPS_ENDPOINT: ${{ secrets.DT_APPS_ENDPOINT }}
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          MODEL: ${{ matrix.model != '' && matrix.model || secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          MAX_RUNS: '1'
        run: |
          set -euo pipefail
          if ! [[ "$TEST_RUN" =~ ^[A-Za-z][A-Za-z0-9_]+$ ]]; then
            echo "Error: TEST_RUN contains invalid characters: $TEST_RUN"; exit 1
          fi
          go test ./... -run "$TEST_RUN" -v -timeout 20m

      - name: Write job summary
        if: always()
        run: |
          for f in test/e2e/reports/*.md; do
            [ -f "$f" ] || continue
            echo "## $(basename "$f" .md)" >> "$GITHUB_STEP_SUMMARY"
            cat "$f" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: span-audit-reports-${{ matrix.name }}
          path: test/e2e/reports/
          retention-days: 30

  notify:
    name: Notify on regression or recovery
    needs: [oneagent-nightly, otelcol]
    if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') # TEMP: remove workflow_dispatch before merging
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Diff audit reports and notify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CURRENT_ONEAGENT: ${{ needs.oneagent-nightly.result }}
          CURRENT_OTELCOL: ${{ needs.otelcol.result }}
        run: bash .github/scripts/notify-nightly.sh
