name: Span Audit Dashboard

on:
  workflow_run:
    workflows: ["Nightly E2E Tests"]
    types: [completed]
    branches: [main]

# Required for GitHub Pages OIDC deploy and artifact download from the
# triggering workflow run.
permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

jobs:
  publish:
    name: Publish span audit dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    # Skip PR workflow runs — only publish for nightly schedule and full
    # workflow_dispatch runs (no suite filter). Also skip if cancelled.
    if: >
      github.event.workflow_run.conclusion != 'cancelled' &&
      (github.event.workflow_run.event == 'schedule' ||
       github.event.workflow_run.event == 'workflow_dispatch')

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: test/e2e/go.mod
          cache: false

      - name: Download all audit report artifacts
        # merge-multiple flattens all matching artifacts into one directory.
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pattern: span-audit-reports-*
          merge-multiple: true
          path: all-reports/
        continue-on-error: true

      - name: Fetch history from gh-pages
        run: |
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          git show origin/gh-pages:history.json > history.json 2>/dev/null \
            || echo '[]' > history.json

      - name: Generate dashboard
        run: |
          mkdir -p site
          cd test/e2e
          go run ./cmd/report-gen \
            --input ../../all-reports \
            --output ../../site/index.html \
            --run-url "${{ github.event.workflow_run.html_url }}" \
            --history-file ../../history.json \
            --history-output ../../site/history.json

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
